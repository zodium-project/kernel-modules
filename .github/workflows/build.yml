# ================================================================
#  kmods-zodium — nightly kmod build & release workflow
#  github.com/zodium-project/kmods-zodium
# ================================================================

name: Build kmods

on:
  push:
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - "LICENSE"
      - ".keepalive"
  pull_request:
  schedule:
    - cron: "43 04 * * *"
    - cron: "17 10 * * *"
    - cron: "13 14 * * *"
    - cron: "57 18 * * *"
  workflow_dispatch:              # manual trigger anytime

jobs:
  keepalive:
    name: Keepalive
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Keepalive
        run: |
          TODAY="$(date -u +%Y-%m-%d)"
          LAST="$(cat .keepalive 2>/dev/null | cut -d' ' -f1 || true)"
          if [[ "${LAST}" == "${TODAY}" ]]; then
            echo "Keepalive already ran today (${TODAY}), skipping."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          date -u +"%Y-%m-%d %H:%M:%S" > .keepalive
          git add .keepalive
          git diff --staged --quiet || git commit -m "chore: keepalive ${TODAY}"
          git push || true

  # ── Detect latest Fedora kernel version ─────────────────────
  detect-kernel:
    name: Detect kernel version
    runs-on: ubuntu-latest
    outputs:
      kernel_version: ${{ steps.detect.outputs.kernel_version }}

    steps:
      - name: Detect latest Fedora kernel
        id: detect
        run: |
          FEDORA_VERSION="$(curl -fLsS "https://endoflife.date/api/fedora.json" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)[0]['cycle'])")"

          KERNEL_VERSION="$(curl -fLsS "https://koji.fedoraproject.org/kojihub" \
            -H "Content-Type: text/xml" \
            -d "<?xml version=\"1.0\"?><methodCall><methodName>getLatestRPMS</methodName><params><param><value>f${FEDORA_VERSION}-updates</value></param><param><value>kernel</value></param></params></methodCall>" \
            | grep -oP '<string>\K[^<]+' | grep '^kernel-[0-9]' | head -1 \
            | sed 's/^kernel-//' | sed 's/$/.x86_64/')"

          [[ -n "$KERNEL_VERSION" ]] \
            || { echo "Failed to detect kernel version"; exit 1; }

          echo "kernel_version=${KERNEL_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected kernel: ${KERNEL_VERSION}"

  # ── Build kmods (parallel matrix) ───────────────────────────
  build:
    name: Build ${{ matrix.kmod }}
    runs-on: ubuntu-latest
    needs: detect-kernel

    strategy:
      fail-fast: true
      matrix:
        kmod: [v4l2loopback, openrazer, nvidia, xpadneo, xone, wl, evdi, hid-fanatecff, sc0710, new-lg4ff, hid-tmff2, openzfs]

    steps:
      - name: Checkout kmods-zodium
        uses: actions/checkout@v6

      - name: Create output directory
        run: mkdir -p output/${{ matrix.kmod }}

      - name: Build ${{ matrix.kmod }} RPMs
        env:
          KERNEL_VERSION: ${{ needs.detect-kernel.outputs.kernel_version }}
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/${{ matrix.kmod }}:/kmods-zodium/${{ matrix.kmod }}:ro" \
            -v "${{ github.workspace }}/output/${{ matrix.kmod }}:/output" \
            -e KERNEL_VERSION="${KERNEL_VERSION}" \
            -e ZODIUM_MOK_KEY="${{ secrets.ZODIUM_MOK_KEY }}" \
            -v "${{ github.workspace }}/mok-file/zodium-mok.der:/zodium-mok.der:ro" \
            fedora:latest \
            bash /kmods-zodium/${{ matrix.kmod }}/build.sh

      - name: Verify RPMs
        run: |
          echo "Built RPMs:"
          ls -lh output/${{ matrix.kmod }}/
          [[ "$(ls output/${{ matrix.kmod }}/*.rpm 2>/dev/null | wc -l)" -gt 0 ]] \
            || { echo "No RPMs found in output/${{ matrix.kmod }}/"; exit 1; }

          # ── v4l2loopback expected packages ──────────────────
          if [[ "${{ matrix.kmod }}" == "v4l2loopback" ]]; then
            ls output/${{ matrix.kmod }}/kmod-${{ matrix.kmod }}-*.rpm \
              || { echo "kmod package missing"; exit 1; }
            ls output/${{ matrix.kmod }}/v4l2loopback-akmod-modules-*.rpm \
              || { echo "v4l2loopback-akmod-modules package missing"; exit 1; }
            ls output/${{ matrix.kmod }}/v4l2loopback-*.rpm \
              || { echo "v4l2loopback companion package missing"; exit 1; }
          fi

          # ── openrazer expected packages ─────────────────────
          if [[ "${{ matrix.kmod }}" == "openrazer" ]]; then
            ls output/${{ matrix.kmod }}/kmod-${{ matrix.kmod }}-*.rpm \
              || { echo "kmod package missing"; exit 1; }
            ls output/${{ matrix.kmod }}/${{ matrix.kmod }}-kmod-common-*.rpm \
              || { echo "common package missing"; exit 1; }
          fi

          # ── nvidia expected packages ─────────────────────────
          if [[ "${{ matrix.kmod }}" == "nvidia" ]]; then
            ls output/${{ matrix.kmod }}/kmod-nvidia-*.rpm \
              || { echo "kmod-nvidia package missing"; exit 1; }
            ls output/${{ matrix.kmod }}/nvidia-kmod-common-*.rpm \
              || { echo "nvidia companion package missing"; exit 1; }
          fi

          # ── xpadneo expected packages ────────────────────────
          if [[ "${{ matrix.kmod }}" == "xpadneo" ]]; then
            ls output/${{ matrix.kmod }}/kmod-xpadneo-*.rpm \
              || { echo "kmod-xpadneo package missing"; exit 1; }
            ls output/${{ matrix.kmod }}/xpadneo-kmod-common-*.rpm \
              || { echo "xpadneo companion package missing"; exit 1; }
          fi

          # ── xone expected packages ───────────────────────────
          if [[ "${{ matrix.kmod }}" == "xone" ]]; then
            ls output/${{ matrix.kmod }}/kmod-xone-*.rpm \
              || { echo "kmod-xone package missing"; exit 1; }
            ls output/${{ matrix.kmod }}/xone-kmod-common-*.rpm \
              || { echo "xone companion package missing"; exit 1; }
          fi

          # ── wl expected packages ─────────────────────────────
          if [[ "${{ matrix.kmod }}" == "wl" ]]; then
            ls output/${{ matrix.kmod }}/kmod-wl-*.rpm \
              || { echo "kmod-wl package missing"; exit 1; }
            ls output/${{ matrix.kmod }}/broadcom-wl-*.rpm \
              || { echo "broadcom-wl companion package missing"; exit 1; }
          fi

          # ── evdi expected packages ───────────────────────────
          if [[ "${{ matrix.kmod }}" == "evdi" ]]; then
            ls output/${{ matrix.kmod }}/kmod-evdi-*.rpm \
              || { echo "kmod-evdi package missing"; exit 1; }
            ls output/${{ matrix.kmod }}/libevdi-*.rpm \
              || { echo "libevdi package missing"; exit 1; }
            ls output/${{ matrix.kmod }}/displaylink-*.rpm \
              || { echo "displaylink package missing"; exit 1; }
          fi

          # ── hid-fanatecff expected packages ─────────────────
          if [[ "${{ matrix.kmod }}" == "hid-fanatecff" ]]; then
            ls output/${{ matrix.kmod }}/kmod-hid-fanatecff-*.rpm \
              || { echo "kmod-hid-fanatecff package missing"; exit 1; }
            ls output/${{ matrix.kmod }}/hid-fanatecff-*.rpm \
              || { echo "hid-fanatecff companion package missing"; exit 1; }
            ls output/${{ matrix.kmod }}/hid-fanatecff-akmod-modules-*.rpm \
              || { echo "hid-fanatecff-akmod-modules package missing"; exit 1; }
          fi

          # ── sc0710 expected packages ─────────────────────────
          if [[ "${{ matrix.kmod }}" == "sc0710" ]]; then
            ls output/${{ matrix.kmod }}/kmod-sc0710-*.rpm \
              || { echo "kmod-sc0710 package missing"; exit 1; }
            ls output/${{ matrix.kmod }}/sc0710-*.rpm \
              || { echo "sc0710 companion package missing"; exit 1; }
          fi

          # ── new-lg4ff expected packages ──────────────────────
          if [[ "${{ matrix.kmod }}" == "new-lg4ff" ]]; then
            ls output/${{ matrix.kmod }}/kmod-new-lg4ff-*.rpm \
              || { echo "kmod-new-lg4ff package missing"; exit 1; }
            ls output/${{ matrix.kmod }}/new-lg4ff-*.rpm \
              || { echo "new-lg4ff companion package missing"; exit 1; }
            ls output/${{ matrix.kmod }}/new-lg4ff-akmod-modules-*.rpm \
              || { echo "new-lg4ff-akmod-modules package missing"; exit 1; }
          fi

          # ── hid-tmff2 expected packages ───────────────────────
          if [[ "${{ matrix.kmod }}" == "hid-tmff2" ]]; then
            ls output/${{ matrix.kmod }}/kmod-hid-tmff2-*.rpm \
              || { echo "kmod-hid-tmff2 package missing"; exit 1; }
            ls output/${{ matrix.kmod }}/hid-tmff2-*.rpm \
              || { echo "hid-tmff2 companion package missing"; exit 1; }
            ls output/${{ matrix.kmod }}/hid-tmff2-akmod-modules-*.rpm \
              || { echo "hid-tmff2-akmod-modules package missing"; exit 1; }
          fi

          # ── openzfs expected packages ────────────────────────
          if [[ "${{ matrix.kmod }}" == "openzfs" ]]; then
            ls output/${{ matrix.kmod }}/kmod-zfs-*.rpm \
              || { echo "kmod-zfs package missing"; exit 1; }
            ls output/${{ matrix.kmod }}/zfs-[0-9]*.rpm \
              || { echo "zfs userland package missing"; exit 1; }
            ls output/${{ matrix.kmod }}/zfs-dracut-*.rpm \
              || { echo "zfs-dracut package missing (initrd hook!)"; exit 1; }
            ls output/${{ matrix.kmod }}/libnvpair*.rpm \
              || { echo "libnvpair package missing"; exit 1; }
            ls output/${{ matrix.kmod }}/libuutil*.rpm \
              || { echo "libuutil package missing"; exit 1; }
            ls output/${{ matrix.kmod }}/libzfs*.rpm \
              || { echo "libzfs package missing"; exit 1; }
            ls output/${{ matrix.kmod }}/libzpool*.rpm \
              || { echo "libzpool package missing"; exit 1; }
          fi

      - name: Sanitize RPM filenames
        run: |
          for rpm in output/${{ matrix.kmod }}/*.rpm; do
            clean="$(dirname "$rpm")/$(basename "$rpm" \
              | sed 's/^[0-9]*://' \
              | sed 's/-[0-9]*:/-/' \
              | sed 's/\^/-/g')"
            [[ "$rpm" != "$clean" ]] && mv "$rpm" "$clean" || true
          done

      - name: Upload RPMs as artifact
        uses: actions/upload-artifact@v6
        with:
          name: rpms-${{ matrix.kmod }}
          path: output/${{ matrix.kmod }}/*.rpm
          retention-days: 1

  # ── Publish — runs only after ALL matrix jobs succeed ────────
  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs: [detect-kernel, build]
    permissions:
      contents: write

    steps:
      - name: Download all RPM artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: rpms-*
          path: all-rpms
          merge-multiple: false

      - name: List RPMs
        run: |
          echo "All RPMs collected for release:"
          find all-rpms -name '*.rpm' | sort
          [[ "$(find all-rpms -name '*.rpm' | wc -l)" -gt 0 ]] \
            || { echo "No RPMs found"; exit 1; }

          mkdir -p flat-rpms
          find all-rpms -name '*.rpm' -exec cp {} flat-rpms/ \;

      - name: Delete all kernel-* releases and tags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Deleting all kmods releases and tags..."
          gh release list \
            --repo ${{ github.repository }} \
            --limit 100 \
            --status draft \
            --json tagName \
            --jq '.[].tagName' \
          | grep '^kernel-' \
          | while read -r TAG; do
              echo "  Deleting draft release and tag: ${TAG}"
              gh release delete "${TAG}" \
                --repo ${{ github.repository }} \
                --yes \
                --cleanup-tag \
                || true
            done

          gh release list \
            --repo ${{ github.repository }} \
            --limit 100 \
            --json tagName \
            --jq '.[].tagName' \
          | grep '^kernel-' \
          | while read -r TAG; do
              echo "  Deleting release and tag: ${TAG}"
              gh release delete "${TAG}" \
                --repo ${{ github.repository }} \
                --yes \
                --cleanup-tag \
                || true
            done
          echo "Done"

      - name: Create release with all RPMs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KERNEL_VERSION: ${{ needs.detect-kernel.outputs.kernel_version }}
        run: |
          RELEASE_TAG="kernel-${KERNEL_VERSION}"

          gh release create "${RELEASE_TAG}" \
            --repo ${{ github.repository }} \
            --title "kernel ${KERNEL_VERSION}" \
            --latest \
            --notes "## kmods-zodium

          **kernel:** \`${KERNEL_VERSION}\`
          **updated:** \`$(date -u '+%Y-%m-%d %H:%M UTC')\`

          All kernel modules built for kernel \`${KERNEL_VERSION}\`.
          Install individual modules in zcore by downloading the relevant RPMs from the assets below." \
            flat-rpms/*.rpm

          echo "Release ${RELEASE_TAG} created successfully"
          echo "Assets uploaded: $(ls flat-rpms/*.rpm | wc -l) RPMs"

  update-repo:
    name: Update DNF repo metadata
    runs-on: ubuntu-latest
    needs: [detect-kernel, publish]
    permissions:
      contents: write

    steps:
      - name: Checkout website repo
        uses: actions/checkout@v6
        with:
          repository: zodium-project/zodium-project.github.io
          token: ${{ secrets.REPO_PAT }}
          path: website

      - name: Install createrepo
        run: sudo apt-get install -y createrepo-c

      - name: Download all RPMs
        uses: actions/download-artifact@v6
        with:
          pattern: rpms-*
          path: all-rpms
          merge-multiple: true

      - name: Update repodata
        env:
          KERNEL_VERSION: ${{ needs.detect-kernel.outputs.kernel_version }}
        run: |
          REPODIR="website/repo/kmods/x86_64"
          mkdir -p "$REPODIR"
          rm -rf "$REPODIR"/repodata

          TMPDIR=$(mktemp -d)
          find all-rpms -name '*.rpm' -exec cp {} "$TMPDIR/" \;
          createrepo_c \
            --baseurl "https://github.com/zodium-project/kmods-zodium/releases/download/kernel-${KERNEL_VERSION}/" \
            "$TMPDIR"

          cp -r "$TMPDIR/repodata" "$REPODIR/"

      - name: Commit and push repodata
        run: |
          cd website
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add repo/
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "repo: update kmods repodata $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push