# ================================================================
#  kmods-zodium — nightly kmod build & release workflow
#  github.com/zodium-project/kmods-zodium
# ================================================================

name: Build kmods

on:
  schedule:
    - cron: '0 2 * * *'        # nightly at 02:00 UTC
  workflow_dispatch:             # manual trigger anytime

jobs:
  # ── Detect latest Fedora kernel version ─────────────────────
  detect-kernel:
    name: Detect kernel version
    runs-on: ubuntu-latest
    outputs:
      kernel_version: ${{ steps.detect.outputs.kernel_version }}

    steps:
      - name: Detect latest Fedora kernel
        id: detect
        run: |
          FEDORA_VERSION="$(curl -fLsS "https://endoflife.date/api/fedora.json" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)[0]['cycle'])")"

          KERNEL_VERSION="$(curl -fLsS "https://koji.fedoraproject.org/kojihub" \
            -H "Content-Type: text/xml" \
            -d "<?xml version=\"1.0\"?><methodCall><methodName>getLatestRPMS</methodName><params><param><value>f${FEDORA_VERSION}-updates</value></param><param><value>kernel</value></param></params></methodCall>" \
            | grep -oP '<string>\K[^<]+' | grep '^kernel-[0-9]' | head -1 \
            | sed 's/^kernel-//' | sed 's/$/.x86_64/')"

          [[ -n "$KERNEL_VERSION" ]] \
            || { echo "Failed to detect kernel version"; exit 1; }

          echo "kernel_version=${KERNEL_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected kernel: ${KERNEL_VERSION}"

  # ── Build kmods ──────────────────────────────────────────────
  build:
    name: Build ${{ matrix.kmod }}
    runs-on: ubuntu-latest
    needs: detect-kernel
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        kmod: [v4l2loopback, openrazer, nvidia, xpadneo, xone, wl, evdi, hid-fanatecff, sc0710, new-lg4ff, hid-tmff2, openzfs]

    steps:
      - name: Checkout kmods-zodium
        uses: actions/checkout@v4

      - name: Check if rebuild needed
        id: check
        env:
          KERNEL_VERSION: ${{ needs.detect-kernel.outputs.kernel_version }}
          KMOD: ${{ matrix.kmod }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_TAG="${KMOD}-${KERNEL_VERSION}"

          STATUS="$(gh release view "${RELEASE_TAG}" \
            --repo ${{ github.repository }} \
            --json tagName \
            -q '.tagName' 2>/dev/null || echo 'not_found')"

          if [[ "$STATUS" == "$RELEASE_TAG" ]]; then
            echo "Release ${RELEASE_TAG} already exists, skipping build"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Release ${RELEASE_TAG} not found, proceeding with build"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Create output directory
        if: steps.check.outputs.skip == 'false'
        run: mkdir -p output

      - name: Build ${{ matrix.kmod }} RPMs
        if: steps.check.outputs.skip == 'false'
        env:
          KERNEL_VERSION: ${{ needs.detect-kernel.outputs.kernel_version }}
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/${{ matrix.kmod }}:/kmods-zodium/${{ matrix.kmod }}:ro" \
            -v "${{ github.workspace }}/output:/output" \
            -e KERNEL_VERSION="${KERNEL_VERSION}" \
            quay.io/fedora/fedora-bootc \
            bash /kmods-zodium/${{ matrix.kmod }}/build.sh

      - name: Verify RPMs
        if: steps.check.outputs.skip == 'false'
        run: |
          echo "Built RPMs:"
          ls -lh output/
          [[ "$(ls output/*.rpm 2>/dev/null | wc -l)" -gt 0 ]] \
            || { echo "No RPMs found in output/"; exit 1; }

          # ── v4l2loopback expected packages ──────────────────
          if [[ "${{ matrix.kmod }}" == "v4l2loopback" ]]; then
            ls output/kmod-${{ matrix.kmod }}-*.rpm \
              || { echo "kmod package missing"; exit 1; }
            ls output/${{ matrix.kmod }}-kmod-common-utils-*.rpm \
              || { echo "utils package missing"; exit 1; }
            ls output/${{ matrix.kmod }}-kmod-common-devel-*.rpm \
              || { echo "devel package missing"; exit 1; }
          fi

          # ── openrazer expected packages ─────────────────────
          if [[ "${{ matrix.kmod }}" == "openrazer" ]]; then
            ls output/kmod-${{ matrix.kmod }}-*.rpm \
              || { echo "kmod package missing"; exit 1; }
            ls output/${{ matrix.kmod }}-kmod-common-*.rpm \
              || { echo "common package missing"; exit 1; }
          fi

          # ── nvidia expected packages ─────────────────────────
          if [[ "${{ matrix.kmod }}" == "nvidia" ]]; then
            ls output/kmod-nvidia-*.rpm \
              || { echo "kmod-nvidia package missing"; exit 1; }
          fi

          # ── xpadneo expected packages ────────────────────────
          if [[ "${{ matrix.kmod }}" == "xpadneo" ]]; then
            ls output/kmod-xpadneo-*.rpm \
              || { echo "kmod-xpadneo package missing"; exit 1; }
          fi

          # ── xone expected packages ───────────────────────────
          if [[ "${{ matrix.kmod }}" == "xone" ]]; then
            ls output/kmod-xone-*.rpm \
              || { echo "kmod-xone package missing"; exit 1; }
          fi

          # ── wl expected packages ─────────────────────────────
          if [[ "${{ matrix.kmod }}" == "wl" ]]; then
            ls output/kmod-wl-*.rpm \
              || { echo "kmod-wl package missing"; exit 1; }
          fi

          # ── evdi expected packages ───────────────────────────
          if [[ "${{ matrix.kmod }}" == "evdi" ]]; then
            ls output/kmod-evdi-*.rpm \
              || { echo "kmod-evdi package missing"; exit 1; }
          fi

          # ── hid-fanatecff expected packages ─────────────────
          if [[ "${{ matrix.kmod }}" == "hid-fanatecff" ]]; then
            ls output/kmod-hid-fanatecff-*.rpm \
              || { echo "kmod-hid-fanatecff package missing"; exit 1; }
          fi

          # ── sc0710 expected packages ─────────────────────────
          if [[ "${{ matrix.kmod }}" == "sc0710" ]]; then
            ls output/kmod-sc0710-*.rpm \
              || { echo "kmod-sc0710 package missing"; exit 1; }
          fi

          # ── new-lg4ff expected packages ──────────────────────
          if [[ "${{ matrix.kmod }}" == "new-lg4ff" ]]; then
            ls output/kmod-new-lg4ff-*.rpm \
              || { echo "kmod-new-lg4ff package missing"; exit 1; }
          fi

          # ── hid-tmff2 expected packages ───────────────────────
          if [[ "${{ matrix.kmod }}" == "hid-tmff2" ]]; then
            ls output/kmod-hid-tmff2-*.rpm \
              || { echo "kmod-hid-tmff2 package missing"; exit 1; }
          fi

          # ── openzfs expected packages ────────────────────────
          if [[ "${{ matrix.kmod }}" == "openzfs" ]]; then
            ls output/kmod-zfs-*.rpm \
              || { echo "kmod-zfs package missing"; exit 1; }
            ls output/zfs-[0-9]*.rpm \
              || { echo "zfs userland package missing"; exit 1; }
            ls output/zfs-dracut-*.rpm \
              || { echo "zfs-dracut package missing (initrd hook!)"; exit 1; }
            ls output/libnvpair*.rpm \
              || { echo "libnvpair package missing"; exit 1; }
            ls output/libuutil*.rpm \
              || { echo "libuutil package missing"; exit 1; }
            ls output/libzfs*.rpm \
              || { echo "libzfs package missing"; exit 1; }
            ls output/libzpool*.rpm \
              || { echo "libzpool package missing"; exit 1; }
          fi

      - name: Create GitHub Release
        if: steps.check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KERNEL_VERSION: ${{ needs.detect-kernel.outputs.kernel_version }}
          KMOD: ${{ matrix.kmod }}
        run: |
          RELEASE_TAG="${{ steps.check.outputs.release_tag }}"

          # ── version extraction (openzfs uses different naming) ─
          if [[ "${KMOD}" == "openzfs" ]]; then
            KMOD_VERSION="$(ls output/kmod-zfs-*.rpm \
              | head -1 \
              | grep -oP '\d+\.\d+\.\d+' \
              | head -1)"
          else
            KMOD_VERSION="$(ls output/kmod-${KMOD}-*.rpm \
              | head -1 \
              | grep -oP '(?<=-)[0-9]+\.[0-9]+\.[0-9]+(?=-)' \
              | tail -1)"
          fi

          if [[ "${KMOD}" == "v4l2loopback" ]]; then
            PACKAGES="\`\`\`
          kmod-${KMOD}-${KERNEL_VERSION}-${KMOD_VERSION}-1.rpm     # kernel module
          ${KMOD}-kmod-common-utils-${KMOD_VERSION}-1.rpm           # userspace utils
          ${KMOD}-kmod-common-devel-${KMOD_VERSION}-1.rpm           # headers
          \`\`\`"
            INSTALL_SNIPPET="\`\`\`dockerfile
          RUN curl -fLsS https://github.com/${{ github.repository }}/releases/download/${RELEASE_TAG}/kmod-${KMOD}-${KERNEL_VERSION}-${KMOD_VERSION}-1.fc\$(rpm -E %fedora).x86_64.rpm -o /tmp/${KMOD}-kmod.rpm \\
              && dnf install -y /tmp/${KMOD}-kmod.rpm \\
              && rm /tmp/${KMOD}-kmod.rpm
          \`\`\`"
          fi

          if [[ "${KMOD}" == "openrazer" ]]; then
            PACKAGES="\`\`\`
          kmod-${KMOD}-${KERNEL_VERSION}-${KMOD_VERSION}-1.rpm      # kernel modules
          ${KMOD}-kmod-common-${KMOD_VERSION}-1.rpm                  # daemon + udev + pylib
          \`\`\`"
            INSTALL_SNIPPET="\`\`\`dockerfile
          RUN curl -fLsS https://github.com/${{ github.repository }}/releases/download/${RELEASE_TAG}/kmod-${KMOD}-${KERNEL_VERSION}-${KMOD_VERSION}-1.fc\$(rpm -E %fedora).x86_64.rpm -o /tmp/${KMOD}-kmod.rpm \\
              && curl -fLsS https://github.com/${{ github.repository }}/releases/download/${RELEASE_TAG}/${KMOD}-kmod-common-${KMOD_VERSION}-1.fc\$(rpm -E %fedora).noarch.rpm -o /tmp/${KMOD}-common.rpm \\
              && dnf install -y /tmp/${KMOD}-kmod.rpm /tmp/${KMOD}-common.rpm \\
              && rm /tmp/${KMOD}-*.rpm
          \`\`\`"
          fi

          if [[ "${KMOD}" == "nvidia" ]]; then
            PACKAGES="\`\`\`
          kmod-nvidia-${KERNEL_VERSION}-${KMOD_VERSION}-1.rpm       # kernel modules
          \`\`\`"
            INSTALL_SNIPPET="\`\`\`dockerfile
          RUN curl -fLsS https://github.com/${{ github.repository }}/releases/download/${RELEASE_TAG}/kmod-nvidia-${KERNEL_VERSION}-${KMOD_VERSION}-1.fc\$(rpm -E %fedora).x86_64.rpm -o /tmp/kmod-nvidia.rpm \\
              && dnf install -y /tmp/kmod-nvidia.rpm \\
              && rm /tmp/kmod-nvidia.rpm
          \`\`\`"
          fi

          if [[ "${KMOD}" == "xpadneo" ]]; then
            PACKAGES="\`\`\`
          kmod-xpadneo-${KERNEL_VERSION}-${KMOD_VERSION}-1.rpm      # kernel module
          \`\`\`"
            INSTALL_SNIPPET="\`\`\`dockerfile
          RUN curl -fLsS https://github.com/${{ github.repository }}/releases/download/${RELEASE_TAG}/kmod-xpadneo-${KERNEL_VERSION}-${KMOD_VERSION}-1.fc\$(rpm -E %fedora).x86_64.rpm -o /tmp/kmod-xpadneo.rpm \\
              && dnf install -y /tmp/kmod-xpadneo.rpm \\
              && rm /tmp/kmod-xpadneo.rpm
          \`\`\`"
          fi

          if [[ "${KMOD}" == "xone" ]]; then
            PACKAGES="\`\`\`
          kmod-xone-${KERNEL_VERSION}-${KMOD_VERSION}-1.rpm         # kernel module
          \`\`\`"
            INSTALL_SNIPPET="\`\`\`dockerfile
          RUN curl -fLsS https://github.com/${{ github.repository }}/releases/download/${RELEASE_TAG}/kmod-xone-${KERNEL_VERSION}-${KMOD_VERSION}-1.fc\$(rpm -E %fedora).x86_64.rpm -o /tmp/kmod-xone.rpm \\
              && dnf install -y /tmp/kmod-xone.rpm \\
              && rm /tmp/kmod-xone.rpm
          \`\`\`"
          fi

          if [[ "${KMOD}" == "wl" ]]; then
            PACKAGES="\`\`\`
          kmod-wl-${KERNEL_VERSION}-${KMOD_VERSION}-1.rpm           # kernel module
          \`\`\`"
            INSTALL_SNIPPET="\`\`\`dockerfile
          RUN curl -fLsS https://github.com/${{ github.repository }}/releases/download/${RELEASE_TAG}/kmod-wl-${KERNEL_VERSION}-${KMOD_VERSION}-1.fc\$(rpm -E %fedora).x86_64.rpm -o /tmp/kmod-wl.rpm \\
              && dnf install -y /tmp/kmod-wl.rpm \\
              && rm /tmp/kmod-wl.rpm
          \`\`\`"
          fi

          if [[ "${KMOD}" == "evdi" ]]; then
            PACKAGES="\`\`\`
          kmod-evdi-${KERNEL_VERSION}-${KMOD_VERSION}-1.rpm         # kernel module
          \`\`\`"
            INSTALL_SNIPPET="\`\`\`dockerfile
          RUN curl -fLsS https://github.com/${{ github.repository }}/releases/download/${RELEASE_TAG}/kmod-evdi-${KERNEL_VERSION}-${KMOD_VERSION}-1.fc\$(rpm -E %fedora).x86_64.rpm -o /tmp/kmod-evdi.rpm \\
              && dnf install -y /tmp/kmod-evdi.rpm \\
              && rm /tmp/kmod-evdi.rpm
          \`\`\`"
          fi

          if [[ "${KMOD}" == "hid-fanatecff" ]]; then
            PACKAGES="\`\`\`
          kmod-hid-fanatecff-${KERNEL_VERSION}-${KMOD_VERSION}-1.rpm  # kernel module
          \`\`\`"
            INSTALL_SNIPPET="\`\`\`dockerfile
          RUN curl -fLsS https://github.com/${{ github.repository }}/releases/download/${RELEASE_TAG}/kmod-hid-fanatecff-${KERNEL_VERSION}-${KMOD_VERSION}-1.fc\$(rpm -E %fedora).x86_64.rpm -o /tmp/kmod-hid-fanatecff.rpm \\
              && dnf install -y /tmp/kmod-hid-fanatecff.rpm \\
              && rm /tmp/kmod-hid-fanatecff.rpm
          \`\`\`"
          fi

          if [[ "${KMOD}" == "sc0710" ]]; then
            PACKAGES="\`\`\`
          kmod-sc0710-${KERNEL_VERSION}-${KMOD_VERSION}-1.rpm     # kernel module
          \`\`\`"
            INSTALL_SNIPPET="\`\`\`dockerfile
          RUN curl -fLsS https://github.com/${{ github.repository }}/releases/download/${RELEASE_TAG}/kmod-sc0710-${KERNEL_VERSION}-${KMOD_VERSION}-1.fc\$(rpm -E %fedora).x86_64.rpm -o /tmp/kmod-sc0710.rpm \\
              && dnf install -y /tmp/kmod-sc0710.rpm \\
              && rm /tmp/kmod-sc0710.rpm
          \`\`\`"
          fi

          if [[ "${KMOD}" == "new-lg4ff" ]]; then
            PACKAGES="\`\`\`
          kmod-new-lg4ff-${KERNEL_VERSION}-${KMOD_VERSION}-1.rpm   # kernel module
          \`\`\`"
            INSTALL_SNIPPET="\`\`\`dockerfile
          RUN curl -fLsS https://github.com/${{ github.repository }}/releases/download/${RELEASE_TAG}/kmod-new-lg4ff-${KERNEL_VERSION}-${KMOD_VERSION}-1.fc\$(rpm -E %fedora).x86_64.rpm -o /tmp/kmod-new-lg4ff.rpm \\
              && dnf install -y /tmp/kmod-new-lg4ff.rpm \\
              && rm /tmp/kmod-new-lg4ff.rpm
          \`\`\`"
          fi

          if [[ "${KMOD}" == "hid-tmff2" ]]; then
            PACKAGES="\`\`\`
          kmod-hid-tmff2-${KERNEL_VERSION}-${KMOD_VERSION}-1.rpm   # kernel module
          \`\`\`"
            INSTALL_SNIPPET="\`\`\`dockerfile
          RUN curl -fLsS https://github.com/${{ github.repository }}/releases/download/${RELEASE_TAG}/kmod-hid-tmff2-${KERNEL_VERSION}-${KMOD_VERSION}-1.fc\$(rpm -E %fedora).x86_64.rpm -o /tmp/kmod-hid-tmff2.rpm \\
              && dnf install -y /tmp/kmod-hid-tmff2.rpm \\
              && rm /tmp/kmod-hid-tmff2.rpm
          \`\`\`"
          fi

          if [[ "${KMOD}" == "openzfs" ]]; then
            FC="$(rpm -E %fedora 2>/dev/null || \
                  ls output/kmod-zfs-*.rpm | head -1 | grep -oP '(?<=\.fc)\d+' | head -1)"
            PACKAGES="\`\`\`
          kmod-zfs-${KERNEL_VERSION}-${KMOD_VERSION}-1.fc${FC}.x86_64.rpm   # kernel module
          zfs-${KMOD_VERSION}-1.fc${FC}.x86_64.rpm                           # zfs + zpool CLI
          zfs-dracut-${KMOD_VERSION}-1.fc${FC}.noarch.rpm                    # initrd hook
          libnvpair3-${KMOD_VERSION}-1.fc${FC}.x86_64.rpm                   # runtime libs
          libuutil3-${KMOD_VERSION}-1.fc${FC}.x86_64.rpm
          libzfs6-${KMOD_VERSION}-1.fc${FC}.x86_64.rpm
          libzpool6-${KMOD_VERSION}-1.fc${FC}.x86_64.rpm
          python3-pyzfs-${KMOD_VERSION}-1.fc${FC}.noarch.rpm
          \`\`\`"
            INSTALL_SNIPPET="\`\`\`dockerfile
          # Download all ZFS RPMs from this release
          RUN cd /tmp && \
              for rpm in \$(curl -fLsS https://api.github.com/repos/${{ github.repository }}/releases/tags/${RELEASE_TAG} \
                  | grep -oP '(?<=\"browser_download_url\": \")[^\"]+\.rpm'); do \
                  curl -fLsS \"\${rpm}\" -O; \
              done && \
              dnf install -y /tmp/kmod-zfs-*.rpm /tmp/zfs-[0-9]*.rpm \
                  /tmp/zfs-dracut-*.rpm /tmp/lib*.rpm /tmp/python3-pyzfs-*.rpm && \
              rm /tmp/*.rpm
          \`\`\`"
          fi

          gh release create "${RELEASE_TAG}" \
            --repo ${{ github.repository }} \
            --title "${KMOD} — kernel ${KERNEL_VERSION}" \
            --notes "## kmods-zodium nightly build

          **kmod:** \`${KMOD}\`
          **kmod version:** \`${KMOD_VERSION}\`
          **kernel:** \`${KERNEL_VERSION}\`
          **built:** \`$(date -u '+%Y-%m-%d %H:%M UTC')\`

          ### Packages
          ${PACKAGES}

          ### Install in zcore
          ${INSTALL_SNIPPET}" \
            output/*.rpm

          echo "Release ${RELEASE_TAG} created successfully"